<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
      --purple: #a855f7;
    }

    body {
      background: #0a0020;
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    .title-font {
      font-family: 'Space Grotesk', sans-serif;
    }

    .hero-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 50% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 60%),
                  radial-gradient(circle at 20% 70%, rgba(192, 132, 252, 0.1) 0%, transparent 50%);
      z-index: -2;
      pointer-events: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      opacity: 0.75;
    }

    .coin {
      animation: float 6s ease-in-out infinite;
      filter: drop-shadow(0 0 60px rgba(168, 85, 247, 0.9)) 
              drop-shadow(0 0 30px rgba(236, 72, 153, 0.6));
      transition: transform 0.4s ease;
    }

    .coin:hover {
      transform: scale(1.08) rotate(8deg);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(2deg); }
      50% { transform: translateY(-30px) rotate(-2deg); }
    }

    .glow-text {
      text-shadow: 
        0 0 20px #c084fc,
        0 0 40px #a855f7,
        0 0 60px #7e22ce;
    }

    .button-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .button-hover:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 20px 25px -5px rgb(168 85 247 / 0.4), 
                  0 8px 10px -6px rgb(168 85 247 / 0.4);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative">
  
  <!-- Canvas for Constellation Effect -->
  <canvas id="constellation"></canvas>
  
  <!-- Subtle radial overlay -->

  <div class="max-w-3xl mx-auto text-center px-6 py-16 relative z-10">
    <!-- Header / Title -->
    <div class="mb-8">
      <h1 class="title-font text-[5.5rem] md:text-[7rem] font-bold tracking-[-0.07em] leading-none text-transparent bg-clip-text bg-gradient-to-b from-violet-300 via-purple-400 to-fuchsia-400 glow-text">
        $MOONINU
      </h1>
    </div>

    <!-- Coin -->
    <div class="flex justify-center mb-12">
      <img id="coin" src="COIN.png" alt="$MOONINU Coin"

    </div>

    <!-- Tagline -->
    <p class="text-4xl md:text-5xl font-medium mb-16 tracking-tight">
      The Moon Pack is rising <span class="text-5xl">🚀🐕</span>
    </p>

    <!-- Social Buttons -->
    <div class="flex flex-col sm:flex-row gap-6 justify-center mb-20">
      <a href="https://x.com/realmooninu?s=11" target="_blank"
         class="button-hover group bg-gradient-to-r from-violet-600 to-purple-600 hover:from-violet-500 hover:to-purple-500 text-white font-semibold text-2xl px-12 py-7 rounded-3xl flex items-center justify-center gap-4 shadow-xl">
        <i class="fa-brands fa-x-twitter text-3xl"></i>
        <span>Twitter / X</span>
      </a>
      
      <a href="https://t.me/+7ARcpPWtiVgxYzI0" target="_blank"
         class="button-hover group bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-semibold text-2xl px-12 py-7 rounded-3xl flex items-center justify-center gap-4 shadow-xl">
        <i class="fa-brands fa-telegram text-3xl"></i>
        <span>Telegram</span>
      </a>
    </div>

    <!-- Community Section -->
    <div class="flex items-center justify-center gap-3 mb-6">
      <span class="text-5xl">🐕</span>
      <span class="text-5xl">🌙</span>

    </div>

    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-10 max-w-lg mx-auto">
      <p class="text-xl leading-relaxed text-violet-100">
        $MOONINU is a community-driven meme coin on a mission to the moon.<br><br>
        Join the pack, vibe with degens, and let's make history together.
      </p>
    </div>

    <!-- Footer Info -->
    <div class="mt-20 text-violet-400/70 text-sm flex flex-col gap-2">

      <p class="text-xs">johnporkandtung.github.io/MOONINU-website</p>
    </div>
  </div>

  <script>
    // Constellation Canvas Animation
    const canvas = document.getElementById('constellation');
    const ctx = canvas.getContext('2d');
    
    let stars = [];
    let lines = [];
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    class Star {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = Math.random() * 2.2 + 0.8;
        this.speed = Math.random() * 0.015 + 0.005;
        this.opacity = Math.random() * 0.7 + 0.3;
      }
      
      update() {
        this.opacity = 0.4 + Math.sin(Date.now() * this.speed) * 0.6;
      }
      
      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = '#e0bbff';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    
    function createStars(count) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push(new Star());
      }
    }
    
    function connectStars() {
      ctx.strokeStyle = 'rgba(192, 132, 252, 0.12)';
      ctx.lineWidth = 0.8;
      
      for (let i = 0; i < stars.length; i++) {
        for (let j = i + 1; j < stars.length; j++) {
          const dx = stars[i].x - stars[j].x;
          const dy = stars[i].y - stars[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          
          if (distance < 160) {
            ctx.globalAlpha = (1 - distance / 160) * 0.4;
            ctx.beginPath();
            ctx.moveTo(stars[i].x, stars[i].y);
            ctx.lineTo(stars[j].x, stars[j].y);
            ctx.stroke();
          }
        }
      }
      ctx.globalAlpha = 1;
    }
    
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw connections first
      connectStars();
      
      // Draw and update stars
      stars.forEach(star => {
        star.update();
        star.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    // Initialize
    window.addEventListener('resize', () => {
      resizeCanvas();
      createStars(220);
    });
    
    resizeCanvas();
    createStars(220);
    animate();
    
    // Make coin clickable (optional fun)
    document.getElementById('coin').addEventListener('click', () => {
      const coin = document.getElementById('coin');
      coin.style.transform = 'scale(1.3) rotate(25deg)';
      setTimeout(() => {
        coin.style.transform = '';
      }, 300);
    });
  </script>
