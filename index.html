<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$MOONINU - The Moon Pack</title>

<!-- PARTICLES JS -->
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #050816;
    overflow-x: hidden;
}

/* PARTICLES BACKGROUND */
#particles-js {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

h1 {
    font-size: 60px;
    color: #7c5cff;
    text-shadow: 0 0 25px #7c5cff;
}

/* SPINNING COIN */
.coin {
    width: 180px;
    margin: 20px auto;
    animation: spin 6s linear infinite;
}

@keyframes spin {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
}

/* BUTTONS */
.btn {
    padding: 12px 25px;
    margin: 10px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    background: #7c5cff;
    color: white;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: #9a7bff;
}

/* CARDS */
.section {
    padding: 50px 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    margin: 15px auto;
    max-width: 500px;
    border-radius: 15px;
}

/* LIVE STATS */
.stats {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.stat-box {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    min-width: 180px;
}

/* DEX BUY BOX */
.buy-box {
    background: rgba(0,0,0,0.5);
    border: 1px solid #7c5cff;
    padding: 25px;
    max-width: 500px;
    margin: auto;
    border-radius: 20px;
}

footer {
    text-align: center;
    padding: 30px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- HERO -->
<div class="hero">
    <h1>$MOONINU</h1>

    <!-- YOUR COIN IMAGE -->
    <img src="COIN.png" class="coin" alt="coin">

    <p>The Moon Pack is rising 🚀🐺</p>

    <a href="https://x.com/realmooninu?s=11" target="_blank">
        <button class="btn">Twitter</button>
    </a>

    <a href="https://t.me/+7ARcpPWtiVgxYzI0" target="_blank">
        <button class="btn">Telegram</button>
    </a>
</div>

<!-- COMMUNITY -->
<div class="section">
    <h2>🐺 Community</h2>
    <div class="card">
        Join the Moon Pack and stay updated on all launches.
    </div>
</div>

<footer>
    © 2026 $MOONINU • Powered by the Moon Pack 🌙
</footer>

<!-- SCRIPTS -->
<script>
// PARTICLES BACKGROUND
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    color: { value: "#7c5cff" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    move: { speed: 2 }
  }
});

// FAKE LIVE PRICE UPDATE
setInterval(() => {
    let price = (0.00010 + Math.random() * 0.00005).toFixed(6);
    document.getElementById("price").innerText = "$" + price;
}, 2000);

// FAKE TELEGRAM MEMBER COUNT
setInterval(() => {
    let base = 2418;
    let change = Math.floor(Math.random() * 5);
    document.getElementById("members").innerText = base + change;
}, 4000);
</script>

</body>
</html>
